# CodeQL advanced setup for SICLient (Swift SPM + GitHub Actions workflows).
#
# Requires CodeQL "default setup" to be disabled for this repository —
# both cannot upload analyses simultaneously. Configure under:
#   Settings → Code security → Code scanning → CodeQL analysis → Advanced
#
name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-actions:
    name: Analyze (actions)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:actions"

  analyze-swift:
    name: Analyze (swift)
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          # Swift SPM autobuild is unreliable on macOS runners — build manually.
          build-mode: manual

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build Swift
        run: swift build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
